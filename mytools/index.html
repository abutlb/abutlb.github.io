<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدواتي الرقمية المفيدة | عبدالله التويجري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f0f9ff;
            overflow-x: hidden;
        }
        .dark-mode { background-color: #0f172a; color: #e2e8f0; }

        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(59,130,246,0.2);
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(to right,
                rgba(59,130,246,0.1), rgba(147,51,234,0.1));
            animation: float 8s ease-in-out infinite;
            z-index: -1;
        }
        .bubble:nth-child(odd) {
            background: linear-gradient(to right,
                rgba(59,130,246,0.1), rgba(16,185,129,0.1));
        }
        @keyframes float {
            0%   { transform: translateY(0) translateX(0) rotate(0deg); }
            33%  { transform: translateY(-20px) translateX(10px) rotate(10deg); }
            66%  { transform: translateY(10px) translateX(-10px) rotate(-5deg); }
            100% { transform: translateY(0) translateX(0) rotate(0deg); }
        }

        .glass-container {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 32px rgba(31,38,135,0.1);
        }
        .dark .glass-container {
            background: rgba(30,41,59,0.7);
            border-color: rgba(30,41,59,0.3);
        }

        .nav-link {
            display: block;
            padding: 0.5rem 1rem;
            transition: all 0.3s ease;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        .nav-link:hover,
        .nav-link.active {
            background: linear-gradient(to right,
                rgba(59,130,246,0.2), rgba(147,51,234,0.2));
            font-weight: bold;
            color: #3b82f6;
        }

        .section-title {
            padding-top: 80px;
            margin-top: -80px;
        }

        @keyframes heartbeat {
            0%,100% { transform: scale(1); }
            25%,75%  { transform: scale(1.1); }
        }
        .heartbeat { animation: heartbeat 1.5s infinite; display: inline-block; }

        .toggle-dark {
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 9999px;
            transition: all 0.3s ease;
        }
        .toggle-dark:hover { background: rgba(59,130,246,0.1); }
    </style>
</head>
<body class="min-h-screen py-8 transition-colors duration-300">

<div id="bubbles-container"></div>

<div class="max-w-6xl mx-auto px-4">

    <!-- Header -->
    <div class="text-center mb-12 glass-container p-8">
        <div class="flex justify-between items-center mb-4">
            <a href="../index.html"
               class="text-sm text-blue-500 hover:text-blue-600 transition-colors flex items-center gap-1">
                <i class="fas fa-arrow-right"></i> البورتفوليو
            </a>
            <h1 class="text-4xl font-bold text-transparent bg-clip-text
                       bg-gradient-to-r from-blue-600 to-purple-600">
                أدواتي الرقمية المفيدة
            </h1>
            <div class="toggle-dark" id="darkModeToggle">
                <i class="fas fa-moon text-gray-600 text-xl"></i>
            </div>
        </div>
        <p class="text-gray-600 dark:text-gray-400 mt-2">
            مجموعة من الأدوات والحاسبات لمساعدتك في اتخاذ قرارات أفضل في مختلف جوانب الحياة
        </p>
        <p class="text-sm text-blue-500 dark:text-blue-400 mt-3">
            صُممت بواسطة عبدالله التويجري
            <span class="heartbeat text-yellow-500 inline-block">
                <i class="fas fa-cog"></i>
            </span>
            لتبسيط التخطيط والحسابات اليومية
        </p>
    </div>

    <!-- Layout -->
    <div class="grid grid-cols-4 gap-6">

        <!-- Sidebar -->
        <div class="col-span-1">
            <div class="sticky top-8 glass-container p-4">
                <ul id="sidebar-nav" class="space-y-2 text-right">
                    <!-- تُبنى بواسطة tools.js -->
                </ul>
            </div>
        </div>

        <!-- Main Content -->
        <div class="col-span-3">
            <div id="main-content">
                <!-- تُبنى بواسطة tools.js -->

                <!-- Skeleton أثناء التحميل -->
                <div id="skeleton" class="space-y-10">
                    <div class="h-8 w-48 bg-gray-200 dark:bg-gray-700 rounded-lg animate-pulse"></div>
                    <div class="grid grid-cols-2 gap-6">
                        <div class="h-56 bg-gray-200 dark:bg-gray-700 rounded-xl animate-pulse"></div>
                        <div class="h-56 bg-gray-200 dark:bg-gray-700 rounded-xl animate-pulse"></div>
                        <div class="h-56 bg-gray-200 dark:bg-gray-700 rounded-xl animate-pulse"></div>
                        <div class="h-56 bg-gray-200 dark:bg-gray-700 rounded-xl animate-pulse"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="pb-32"></div>
</div>

<!-- Footer -->
<footer class="fixed bottom-0 left-0 right-0 py-4 px-6 text-center
               text-gray-500 dark:text-gray-400 text-sm
               glass-container backdrop-blur-md rounded-none">
    <div class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-4 items-center">
        <div class="text-center md:text-right">
            <p>صنع بواسطة عبدالله التويجري © <span id="currentYear"></span></p>
        </div>
        <div class="text-center">
            <div class="flex justify-center gap-4">
                <a href="https://twitter.com/abutlb" target="_blank"
                   class="text-blue-400 hover:text-blue-500 transition-colors">
                    <i class="fab fa-twitter"></i>
                </a>
                <a href="https://www.linkedin.com/in/abdullah-altwijri-b053b1234/" target="_blank"
                   class="text-blue-700 hover:text-blue-800 transition-colors">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="https://github.com/abutlb" target="_blank"
                   class="text-gray-700 dark:text-gray-300 hover:text-gray-900 transition-colors">
                    <i class="fab fa-github"></i>
                </a>
                <a href="mailto:abutlb10015@gmail.com"
                   class="text-red-500 hover:text-red-600 transition-colors">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
        </div>
        <div class="text-center md:text-left">
            <p>جميع الأدوات مجانية للاستخدام 😊</p>
        </div>
    </div>
</footer>

<!-- pages.js أولاً ثم tools.js -->
<script src="data.js"></script>
<script src="pages.js"></script>

</body>
</html>
