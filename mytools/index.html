    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Tajawal', sans-serif; }

        /* ── Hero ── */
        .hero-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 45%, #2563eb 75%, #7c3aed 100%);
        }

        /* ── Glass ── */
        .glass {
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 24px rgba(31,38,135,0.07);
        }
        .dark .glass {
            background: rgba(15,23,42,0.88);
            border-color: rgba(148,163,184,0.1);
        }

        /* ── Search input ── */
        .search-box {
            width: 100%;
            padding: 11px 48px 11px 20px;
            border-radius: 100px;
            border: 2px solid rgba(255,255,255,0.28);
            background: rgba(255,255,255,0.14);
            color: white;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
        }
        .search-box::placeholder { color: rgba(255,255,255,0.5); }
        .search-box:focus {
            border-color: rgba(255,255,255,0.6);
            background: rgba(255,255,255,0.22);
        }

        /* ── Sidebar nav ── */
        .cat-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 9px 12px;
            border-radius: 10px;
            font-size: 0.88rem;
            color: #374151;
            text-decoration: none;
            transition: all 0.2s;
            gap: 8px;
        }
        .cat-link:hover { background: rgba(59,130,246,0.08); color: #2563eb; }
        .cat-link.active {
            background: linear-gradient(135deg, rgba(59,130,246,0.12), rgba(124,58,237,0.12));
            color: #2563eb;
            font-weight: 700;
        }
        .dark .cat-link { color: #cbd5e1; }
        .dark .cat-link:hover { background: rgba(96,165,250,0.1); color: #93c5fd; }
        .dark .cat-link.active { color: #60a5fa; background: rgba(96,165,250,0.12); }

        /* ── Tool card ── */
        .tool-card {
            display: block;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            text-decoration: none;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s;
        }
        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 32px -8px rgba(37,99,235,0.18);
            border-color: #bfdbfe;
        }
        .dark .tool-card {
            background: #1e293b;
            border-color: #334155;
        }
        .dark .tool-card:hover { border-color: #3b82f6; box-shadow: 0 16px 32px -8px rgba(59,130,246,0.2); }

        /* line-clamp fallback */
        .clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* ── Section anchor offset ── */
        .sec-anchor { padding-top: 80px; margin-top: -80px; }

        /* ── Wave ── */
        .hero-wave path { transition: fill 0.3s; }

        /* ── Back pill ── */
        .pill-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 7px 16px;
            border-radius: 100px;
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.24);
            color: white;
            font-size: 0.82rem;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
            font-family: 'Tajawal', sans-serif;
        }
        .pill-btn:hover { background: rgba(255,255,255,0.24); }

        /* ── Footer ── */
        .footer-glass {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0,0,0,0.06);
        }
        .dark .footer-glass {
            background: rgba(15,23,42,0.95);
            border-top-color: rgba(255,255,255,0.06);
        }

        /* ── No results ── */
        #no-results { display: none; }
    </style>
</head>
